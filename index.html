 <!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOGRA STORE | Aset Roblox Studio Premium</title>
    <!-- Hubungkan Google Fonts untuk Orbitron dan Rajdhani sesuai setelan asli v0 -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com"></script>
    <style>
        /* Gaya Dasar & Efek Masker Grid Beranimasi Sesuai Teks Developer Tools */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0f1f;
            color: #94a3b8;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        /* Efek Jaring Animasi Kotak-Kotak Komputer Asli */
        .grid-bg {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            background-image: 
                linear-gradient(to right, rgba(56, 189, 248, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
            z-index: 1;
        }

        /* Pendaran Bulat Glow di Belakang Judul */
        .pulse-glow {
            position: absolute;
            left: 50%;
            top: 35%;
            height: 280px;
            width: 280px;
            transform: translate(-x-1/2, -y-1/2);
            background-color: rgba(56, 189, 248, 0.25);
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* Navigasi Utama Hero */
        .hero {
            text-align: center;
            padding: 120px 20px 80px 20px;
            position: relative;
        }

        .badge-premium {
            background-color: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        /* Gaya Judul Utama Menggunakan Font Orbitron Khusus Guna Mengunci Kemiripan Sempurna */
        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 64px;
            font-weight: 900;
            margin: 0;
            line-height: 1.1;
            letter-spacing: 2px;
        }

        .hero h1 span {
            background: linear-gradient(to bottom, #38bdf8, rgba(56, 189, 248, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.4));
        }

        .hero p {
            font-size: 16px;
            max-width: 550px;
            margin: 20px auto 40px auto;
            line-height: 1.6;
            color: #94a3b8;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Tombol Utama */
        .btn-white {
            background-color: #38bdf8;
            color: #0a0f1f;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 14px;
            box-shadow: 0 0 30px -5px rgba(56, 189, 248, 0.5);
        }
        .btn-white:hover { background-color: #7dd3fc; }
        
        .btn-dark {
            background-color: transparent;
            color: #ffffff;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.4);
            display: inline-block;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-dark:hover { background-color: rgba(56, 189, 248, 0.1); }

        /* Bagian Judul Katalog */
        .section-title {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 60px;
        }
        .section-title p {
            color: #38bdf8;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .section-title h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }

        /* Grid Komponen Kartu Produk */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        .card {
            background-color: rgba(10, 15, 31, 0.6);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: rgba(56, 189, 248, 0.5);
        }
        .price-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(2, 6, 23, 0.8);
            border: 1px solid #334155;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            z-index: 10;
        }
        .image-box {
            height: 160px;
            border: 1px solid rgba(51, 65, 85, 0.4);
            border-radius: 12px;
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
            background-color: #020617;
        }
        .card h3 {
            color: #ffffff;
            font-size: 18px;
            margin: 0 0 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card .sub {
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .card .desc {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #94a3b8;
        }
        .card .btn-buy {
            background-color: #ffffff;
            color: #020617;
            text-align: center;
            padding: 10px 0;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: 0.2s;
        }
        .card .btn-buy:hover { background-color: #e2e8f0; }

        /* Jasa & Layanan Studio (Sesuai Gambar Masukan Tabel) */
        .jasa-box {
            background-color: rgba(10, 15, 31, 0.6);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 80px;
            backdrop-filter: blur(8px);
        }
        .jasa-header {
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .jasa-desc {
            font-size: 14px;
            margin-bottom: 30px;
            color: #94a3b8;
        }
        .jasa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            border-top: 1px solid #1e293b;
            padding-top: 24px;
        }
        .jasa-title {
            color: #38bdf8;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .jasa-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .jasa-list li {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .jasa-list li::before {
            content: "•";
            color: #38bdf8;
            font-weight: bold;
            display: inline-block; 
            width: 15px;
        }
        .jasa-list.harga li {
            justify-content: space-between;
            border-bottom: 1px solid rgba(51, 65, 85, 0.2);
            padding-bottom: 8px;
        }
        .jasa-list.harga li::before { content: none; }
        .jasa-list .label-harga {
            background-color: #020617;
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #1e293b;
        }
        .jasa-footer {
            text-align: center;
            border-top: 1px solid #1e293b;
